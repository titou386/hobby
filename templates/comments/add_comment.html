{% extends "base.html" %}

{% block title %}Ajouter un commentaire{% endblock %}

{% block content %}
    <h1>Ajouter un commentaire</h1>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label for="content" class="form-label">Votre commentaire</label>
            {{ form.content }}
        </div>

        <button type="submit" class="btn btn-primary">Publier</button>
        <a href="{% url 'blog:article_detail' article.slug %}" class="btn btn-secondary">Annuler</a>
    </form>
{% endblock %}
