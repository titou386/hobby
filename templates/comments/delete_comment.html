{% extends "base.html" %}

{% block title %}Supprimer le commentaire{% endblock %}

{% block content %}
    <h1>Supprimer le commentaire</h1>
    <p>Êtes-vous sûr de vouloir supprimer ce commentaire ?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
        <a href="{% url 'blog:article_detail' article_slug %}" class="btn btn-secondary">Annuler</a>
    </form>
{% endblock %}
