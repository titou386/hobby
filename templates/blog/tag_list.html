{% extends "base.html" %}

{% block title %}Liste des Tags{% endblock %}

{% block content %}
    <h1 class="mb-4">Tags</h1>

    <div class="row">
        {% for tag in tags %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">
                            <a href="{% url 'blog:tag_detail' tag.slug %}">{{ tag.name }}</a>
                        </h5>
                        <p class="card-text">{{ tag.articles.count }} article(s)</p>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="alert alert-info">Aucun tag trouvé.</div>
        {% endfor %}
    </div>
{% endblock %}
