{% extends "base.html" %}

{% block title %}Liste des Catégories{% endblock %}

{% block content %}
    <h1 class="mb-4">Catégories</h1>

    <div class="row">
        {% for category in categories %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">
                            <a href="{% url 'blog:category_detail' category.slug %}">{{ category.name }}</a>
                        </h5>
                        <p class="card-text">{{ category.articles.count }} article(s)</p>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="alert alert-info">Aucune catégorie trouvée.</div>
        {% endfor %}
    </div>
{% endblock %}
